security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    role_hierarchy:
        ROLE_ADMIN: ROLE_USER
        ROLE_GESTIONNAIRE: ROLE_USER
        ROLE_CLIENT: ROLE_USER

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider

            form_login:
                login_path: app_login
                check_path: app_login_check
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: authenticate
                default_target_path: /app
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: app_logout
                csrf_token_manager: security.csrf.token_manager
                csrf_parameter: _csrf_token
                csrf_token_id: logout
                target: app_login

    access_control:
        - { path: ^/api/admin, roles: ROLE_ADMIN }
        - { path: ^/api/me, roles: PUBLIC_ACCESS }
        - { path: ^/api/ui/bootstrap, roles: PUBLIC_ACCESS }
        - { path: ^/api/ui, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/setup, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/account, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth/, roles: PUBLIC_ACCESS }
        - { path: ^/app, roles: PUBLIC_ACCESS }
        - { path: ^/locale/, roles: PUBLIC_ACCESS }
        - { path: ^/connexion, roles: PUBLIC_ACCESS }
        - { path: ^/inscription, roles: PUBLIC_ACCESS }
        - { path: ^/mot-de-passe-oublie, roles: PUBLIC_ACCESS }
        - { path: ^/reinitialiser-mot-de-passe, roles: PUBLIC_ACCESS }
        - { path: ^/invitation, roles: PUBLIC_ACCESS }
        - { path: ^/verifier-email, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: PUBLIC_ACCESS }
        - { path: ^/favicon\.ico$, roles: PUBLIC_ACCESS }
        - { path: ^/favicon\.svg$, roles: PUBLIC_ACCESS }
        - { path: ^/robots\.txt$, roles: PUBLIC_ACCESS }
        - { path: ^/compte, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
