# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Session : httpOnly, SameSite ; cookie_secure=auto sous HTTPS (trusted proxy / X-Forwarded-Proto).
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        cookie_httponly: true
        name: ALERTJETSESSID

    # Derrière un reverse-proxy TLS : dans .env.local — TRUSTED_PROXIES=127.0.0.1,REMOTE_ADDR
    # puis activer trusted_proxies / trusted_headers (voir doc Symfony « Trusting Reverse Proxies »).

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
